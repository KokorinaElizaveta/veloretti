    <nav class="flex gap-x-4 font-medium">

        <a href="">

            </div>
        </div>
        <article class="w-1/3 px-10 pt-20 flex flex-col gap-y-8">
            <div class="flex justify-between">

            </ul>

            <hr>
            <div>
                <h3 class="font-light text-xl">Ivy Two Matte Black</h3>
                <ul class="flex gap-x-6">
                    <li class="border h-8 w-8 rounded-full hover:border flex justify-center items-center">
                        <div class="h-3 w-3 rounded-full bg-gray-800"></div>
                    </li>

                    <li class="h-8 w-8 rounded-full hover:border flex justify-center items-center">

                    </li>

                    <li class="h-8 w-8 rounded-full hover:border flex justify-center items-center">
                        <div class="h-3 w-3 rounded-full bg-olive-400"></div>
                    </li>

                    <li class="h-8 w-8 rounded-full hover:border flex justify-center items-center">
                        <input type="color" class="h-9 w-3 rounded-full">
                    </li>

                </ul>
            </div>
